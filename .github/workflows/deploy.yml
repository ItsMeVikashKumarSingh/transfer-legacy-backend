name: Deploy

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository }}/transfer-legacy-api
  WORKER_IMAGE_NAME: ${{ github.repository }}/transfer-legacy-worker

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push API (amd64, arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
          build-args: |
            BIN_NAME=transfer-legacy-api
      - name: Build and Push Worker (amd64, arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:latest
          build-args: |
            BIN_NAME=transfer-legacy-worker
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.ref_name }}
            docker pull ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:${{ github.ref_name }}
            docker tag ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.ref_name }} transfer-legacy-api:latest
            docker tag ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:${{ github.ref_name }} transfer-legacy-worker:latest
            docker compose -f /opt/transfer-legacy/docker-compose.yml up -d
