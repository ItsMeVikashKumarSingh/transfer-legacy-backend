name: Deploy

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  # Use lowercase for registry names
  API_IMAGE_NAME: itsmevikashkumarsingh/transfer-legacy-backend/transfer-legacy-api
  WORKER_IMAGE_NAME: itsmevikashkumarsingh/transfer-legacy-backend/transfer-legacy-worker

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:latest
          build-args: |
            BIN_NAME=transfer-legacy-api

      - name: Build and Push Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:latest
          build-args: |
            BIN_NAME=transfer-legacy-worker

      - name: Deploy via SSH
        if: secrets.DEPLOY_HOST != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            PROJECT_DIR="/opt/transfer-legacy"
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR
            
            # --- Setup Bootstrap Env ---
            # These are the ONLY keys that stay on the disk.
            # Everything else is fetched from Vault.
            echo "ROLE_ID=${{ secrets.ROLE_ID }}" > .env
            echo "SECRET_ID=${{ secrets.SECRET_ID }}" >> .env
            echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env
            
            # Pull Latest
            docker compose pull
            
            # Restart Services
            docker compose up -d --force-recreate
            
            # Cleanup old images to save space
            docker image prune -f
