name: Security Scan

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  static-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/ci
            .semgrep/rules.yml
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2

  image-security:
    runs-on: ubuntu-latest
    needs: [static-security]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch_tag: amd64
          - platform: linux/arm64
            arch_tag: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build Runtime Image (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          push: false
          load: true
          platforms: ${{ matrix.platform }}
          tags: transfer-legacy-api:scan-${{ matrix.arch_tag }}
          build-args: |
            BIN_NAME=transfer-legacy-api
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: transfer-legacy-api:scan-${{ matrix.arch_tag }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
