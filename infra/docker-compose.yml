services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=transfer_legacy
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ../migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transfer_legacy"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: ${API_IMAGE:-transfer-legacy-api:local}
    build:
      context: ..
      dockerfile: infra/Dockerfile
      args:
        BIN_NAME: transfer-legacy-api
    env_file:
      - ${RUNTIME_PROFILE_FILE:-profiles/small.runtime.env}
      - ${TL_ENV_FILE:-../.env.local}
    environment:
      - TL_BIND_ADDR=0.0.0.0
      - TL_PORT=8080
      - TL_ALLOWED_ORIGINS=http://localhost:3000
      - RUNTIME_PROFILE=${RUNTIME_PROFILE:-small}
      # Local dev uses the compose Postgres by default; override if needed.
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/transfer_legacy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      openbao:
        condition: service_started
    ports:
      - "8080:8080"
    ulimits:
      core: 0

  worker:
    image: ${WORKER_IMAGE:-transfer-legacy-worker:local}
    build:
      context: ..
      dockerfile: infra/Dockerfile
      args:
        BIN_NAME: transfer-legacy-worker
    command: ["/app/transfer-legacy-worker"]
    env_file:
      - ${RUNTIME_PROFILE_FILE:-profiles/small.runtime.env}
      - ${TL_ENV_FILE:-../.env.local}
    environment:
      - TL_BIND_ADDR=0.0.0.0
      - TL_PORT=8081
      - TL_ALLOWED_ORIGINS=http://localhost:3000
      - RUNTIME_PROFILE=${RUNTIME_PROFILE:-small}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/transfer_legacy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      openbao:
        condition: service_started
    ulimits:
      core: 0

  redis:
    image: ${REDIS_IMAGE:-valkey/valkey:8-alpine}
    command: ["valkey-server", "--requirepass", "localdev", "--bind", "0.0.0.0"]
    ports:
      - "6379:6379"

  openbao:
    image: ${OPENBAO_IMAGE:-openbao/openbao:2.5.0-amd64@sha256:74a9997f0fc630f429fd71bdf2e7fffba39fe3024ca1ded9f094b15f7ea3f79e}
    command: ["server", "-config=/openbao/config.hcl"]
    cap_add:
      - IPC_LOCK
    ports:
      - "127.0.0.1:8200:8200"
    volumes:
      - ./openbao/config.hcl:/openbao/config.hcl:ro
      - ./openbao/data:/openbao/data
