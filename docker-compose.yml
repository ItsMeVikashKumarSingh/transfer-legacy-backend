services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    restart: always
    environment:
      - OPENBAO_ADDR=http://openbao:8200
      - ROLE_ID=${ROLE_ID}
      - SECRET_ID=${SECRET_ID}
      - BAO_PATH=secret/data/transfer-legacy/prod
      - RUST_LOG=info
    # SIGHUP can be sent via: docker kill -s HUP <container_id>
    networks:
      - tl-network
    depends_on:
      openbao:
        condition: service_healthy

  openbao:
    image: openbao/openbao:latest
    restart: always
    ports:
      - "8200:8200"
    environment:
      - BAO_ADDR=http://0.0.0.0:8200
    volumes:
      - ./infra/openbao/config.hcl:/bao/config/config.hcl
      - bao-data:/bao/file
    command: server -config=/bao/config/config.hcl
    healthcheck:
      test: ["CMD", "bao", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tl-network

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - tl-network
    volumes:
      - redis-data:/data

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - tl-network
    depends_on:
      - backend

networks:
  tl-network:
    driver: bridge

volumes:
  bao-data:
  redis-data:
  caddy-data:
  caddy-config:
