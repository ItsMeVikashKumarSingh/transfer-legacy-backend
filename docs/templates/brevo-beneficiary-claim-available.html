<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{params.brand_name}} Claim Available</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f5f5f0;
        font-family: "Georgia", "Times New Roman", serif;
        color: #1f1d1b;
      }
      .wrapper {
        max-width: 640px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }
      .card {
        background: #ffffff;
        border: 1px solid #e0ddd7;
        border-radius: 12px;
        padding: 28px;
        box-shadow: 0 8px 24px rgba(22, 18, 14, 0.08);
      }
      .badge {
        display: inline-block;
        background: #1f1d1b;
        color: #f5f5f0;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 16px 0 12px;
        font-size: 26px;
        line-height: 1.2;
      }
      p {
        margin: 0 0 12px;
        font-size: 16px;
        line-height: 1.6;
      }
      .cta {
        display: inline-block;
        margin: 18px 0 8px;
        padding: 12px 18px;
        background: #1f1d1b;
        color: #ffffff !important;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
      }
      .footer {
        margin-top: 22px;
        font-size: 12px;
        color: #6f6b65;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <span class="badge">Claim</span>
        <h1>A claim is now available</h1>
        <p>
          You can begin the claim process in {{params.brand_name}}. Please
          review the instructions and submit your claim when ready.
        </p>
        <a class="cta" href="{{params.app_url}}/claims">
          Start Claim
        </a>
      </div>
      <div class="footer">
        You are receiving this notification because you are a beneficiary in
        {{params.brand_name}}.
      </div>
    </div>
  </body>
</html>
